<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#8a2b2b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>擇日こよみ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%238a2b2b'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='serif'>吉</text></svg>">
<style>
:root{
  --bg:#f7f4ef; --card:#ffffff; --ink:#2b2620; --sub:#8a8073;
  --accent:#8a2b2b; --accent-ink:#ffffff; --gold:#b8860b;
  --line:#e6e0d6; --hit:#fdf3e3; --warn:#b03030; --chip:#efe9df;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#1c1a17; --card:#26231f; --ink:#ece6dc; --sub:#9a9184;
    --accent:#c05a5a; --accent-ink:#fff; --gold:#d9a94a;
    --line:#3a362f; --hit:#3a3122; --warn:#e06a6a; --chip:#33302a;
  }
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho",serif;
  background:var(--bg); color:var(--ink);
  padding:max(12px, env(safe-area-inset-top)) 14px calc(24px + env(safe-area-inset-bottom));
  max-width:560px; margin:0 auto; line-height:1.55;
  -webkit-text-size-adjust:100%;
}
header{text-align:center; padding:10px 0 14px}
header h1{font-size:1.5rem; letter-spacing:.35em; text-indent:.35em; color:var(--accent)}
header .range{font-size:.72rem; color:var(--sub); margin-top:2px}
.card{
  background:var(--card); border:1px solid var(--line); border-radius:14px;
  padding:14px 16px; margin-bottom:14px;
}
.today .date{font-size:.85rem; color:var(--sub)}
.today .kanshi{font-size:1.6rem; margin:2px 0}
.today .kanshi .mark{color:var(--gold)}
.today .kanshi .markx{color:var(--warn)}
.today .items{font-size:.95rem}
.today .none{color:var(--sub); font-size:.9rem}
.today .meanings{margin-top:8px; font-size:.78rem; color:var(--sub); border-top:1px dashed var(--line); padding-top:8px}
.geppa-note{margin-top:8px; font-size:.85rem; color:var(--warn); border-top:1px dashed var(--line); padding-top:8px}
.geppa-btn{width:100%; font-family:inherit; font-size:.92rem; padding:12px 4px; margin-top:2px;
  background:var(--card); color:var(--warn); border:1px solid var(--line); border-radius:12px; cursor:pointer}
.geppa-btn.active{background:var(--warn); color:#fff; border-color:var(--warn)}
.gp{font-size:.72rem; color:var(--warn); border:1px solid var(--warn); border-radius:4px; padding:0 4px; margin-left:2px; white-space:nowrap}
.rk{font-size:.7rem; color:var(--sub); white-space:nowrap; min-width:2.6em}
.rk.taian{color:var(--gold); font-weight:600}
.rk.butsu{opacity:.7}
.pm{font-size:.8rem; white-space:nowrap}
.pm.star{color:var(--gold)}
.pm.chong{color:var(--warn)}
.worst{font-size:.72rem; color:#fff; background:var(--warn); border-radius:4px; padding:0 5px; margin-left:2px; white-space:nowrap}
.legend{margin-top:10px; font-size:.68rem; color:var(--sub); line-height:1.8}
h2{font-size:.85rem; color:var(--sub); font-weight:normal; margin:16px 2px 8px; letter-spacing:.15em}
.uses{display:grid; grid-template-columns:repeat(3,1fr); gap:8px}
.uses button{
  font-family:inherit; font-size:.92rem; padding:12px 4px;
  background:var(--card); color:var(--ink);
  border:1px solid var(--line); border-radius:12px; cursor:pointer;
  transition:background .15s;
}
.uses button.active{background:var(--accent); color:var(--accent-ink); border-color:var(--accent)}
.chips{display:flex; flex-wrap:wrap; gap:6px; margin-top:4px}
.chips button{
  font-family:inherit; font-size:.78rem; padding:5px 10px;
  background:var(--chip); color:var(--ink);
  border:1px solid var(--line); border-radius:999px; cursor:pointer;
}
.chips button.active{background:var(--accent); color:var(--accent-ink); border-color:var(--accent)}
#result{margin-top:14px}
.meaning{font-size:.8rem; color:var(--sub); margin:0 2px 8px}
.day{
  display:flex; align-items:baseline; gap:10px;
  background:var(--card); border:1px solid var(--line); border-radius:12px;
  padding:10px 14px; margin-bottom:8px; font-size:.95rem;
}
.day .d{min-width:6.2em; white-space:nowrap}
.day .d .wd{font-size:.8rem; color:var(--sub)}
.day .d .sat{color:#3a6ea5}.day .d .sun{color:var(--warn)}
.day .k{min-width:2.6em; color:var(--gold)}
.day .it{font-size:.85rem; color:var(--sub); flex:1}
.day .it b{color:var(--ink); font-weight:600; background:var(--hit); padding:0 3px; border-radius:4px}
.day .add{font-size:.78rem; color:var(--accent); text-decoration:none; white-space:nowrap;
  border:1px solid var(--accent); border-radius:999px; padding:3px 9px; margin-left:auto; align-self:center}
.empty{color:var(--sub); font-size:.9rem; padding:10px 4px}
.more{width:100%; font-family:inherit; font-size:.85rem; padding:10px;
  background:none; color:var(--sub); border:1px dashed var(--line); border-radius:12px; cursor:pointer}
footer{margin-top:22px; text-align:center; font-size:.68rem; color:var(--sub)}
footer p{margin:2px 0}
</style>
</head>
<body>
<header>
  <h1>擇日こよみ</h1>
  <div class="range" id="range"></div>
</header>

<div class="card today" id="today"></div>

<h2>用途からさがす</h2>
<div class="uses" id="uses"></div>

<h2>そのほかの項目</h2>
<div class="chips" id="chips"></div>

<h2>気をつける日</h2>
<button class="geppa-btn" id="geppaBtn">⚠ 月破 ─ 大事な行動を避けたい日</button>

<div id="result"></div>

<footer>
  <p class="legend">六曜＝大安・仏滅など（旧暦から算出）<br>
  ⭐＝木水の巡る日（気の合う日）／▲＝冲の日（大事は控えめに）<br>
  月破＝大凶日／<b>大凶</b>＝月破と冲が重なる日</p>
  <p>出典：鍾福堂通書系 擇日通書</p>
  <p id="foot-range"></p>
</footer>

<script>
const DATA = /*__DATA__*/[];

const MEANING = {
 "立券交易":"契約事全般。",
 "求医療病":"病院関係全般（お見舞いは除く）。",
 "訂盟":"同等の立場の企業と同盟を組む。",
 "会親友":"会食。従業員との食事会。",
 "解除":"契約や人間関係、何かを止めるに適した日。",
 "納財":"支払や投資などお金を動かす。",
 "竪旗掛匾":"看板やのぼりの設置。チラシや広告を打つ。",
 "開市":"新事業や新店舗のオープン。",
 "出行":"出張。遠出する事に向いている。",
 "上表彰":"会議や行政などに書類を申請する日。",
 "上官赴任":"新役職を与える。上司や目上の人に進言する。",
 "月破大耗":"大凶日。大事な行動は避ける。"
};

const USES = [
 {label:"契約",       match:["立券交易","契約"]},
 {label:"出張・遠出", match:["出行","旅行"]},
 {label:"会食",       match:["会親友","会食"]},
 {label:"支払・投資", match:["納財"]},
 {label:"開業・開店", match:["開市"]},
 {label:"病院",       match:["求医療病","病院","病院関係"]},
 {label:"提携・同盟", match:["訂盟"]},
 {label:"看板・広告", match:["竪旗掛匾"]},
 {label:"書類申請",   match:["上表彰"]},
 {label:"役職・進言", match:["上官赴任"]},
 {label:"解約・整理", match:["解除"]},
 {label:"神仏参拝",   match:["神仏参拝","お墓参り吉日"]}
];

const WD = ["日","月","火","水","木","金","土"];
const byDate = {};
DATA.forEach(r => byDate[r.date] = r);
const first = DATA[0].date, last = DATA[DATA.length-1].date;

function fmt(dstr){
  const d = new Date(dstr + "T00:00:00");
  const w = d.getDay();
  const cls = w===0 ? "sun" : w===6 ? "sat" : "";
  return {txt:(d.getMonth()+1)+"/"+d.getDate(), wd:WD[w], cls, month:d.getMonth()+1};
}
function todayStr(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

/* 今日のこよみ */
(function(){
  const t = todayStr();
  const el = document.getElementById("today");
  const r = byDate[t];
  const f = fmt(t);
  let h = '<div class="date">今日 '+f.txt+'（'+f.wd+'）'+(r&&r.r ? '・'+r.r : '')+'</div>';
  if(!r){
    h += '<div class="none">この日の擇日は未記録です（登録範囲外）。</div>';
  }else{
    const mk = r.mark==="◎" ? '<span class="mark">◎</span>'
             : r.mark==="✕" ? '<span class="markx">✕</span>' : "";
    h += '<div class="kanshi">'+r.kanshi+' '+mk+'</div>';
    if(r.items.length){
      h += '<div class="items">'+r.items.join("・")+'</div>';
      const ms = r.items.filter(i=>MEANING[i]).map(i=>i+"＝"+MEANING[i]);
      if(ms.length) h += '<div class="meanings">'+ms.join("<br>")+'</div>';
    }else{
      h += '<div class="none">吉項目なし。特別な事は控えめに。</div>';
    }
    if(r.geppa && r.p==="冲"){
      h += '<div class="geppa-note">‼ 月破と冲が重なる大凶日 ─ 大事な行動は見送りを。</div>';
    }else if(r.geppa){
      h += '<div class="geppa-note">⚠ 月破 ─ 契約・開業など大事な行動は避けたい日です。</div>';
    }else if(r.p==="冲"){
      h += '<div class="geppa-note">▲ 冲の日 ─ 大事な判断は控えめに。</div>';
    }
    if(r.p==="吉" && !r.geppa){
      h += '<div class="geppa-note" style="color:var(--gold)">⭐ 木水の巡る日 ─ 気の合う一日です。</div>';
    }
  }
  el.innerHTML = h;
})();

/* 用途ボタン */
let activeBtn = null, shownAll = false;
const usesEl = document.getElementById("uses");
USES.forEach(u=>{
  const b = document.createElement("button");
  b.textContent = u.label;
  b.onclick = ()=>select(b, u.match, u.label);
  usesEl.appendChild(b);
});

/* そのほかのチップ（主要ボタンに含まれない項目を自動抽出） */
const covered = new Set();
USES.forEach(u=>u.match.forEach(m=>covered.add(m)));
covered.add("月破大耗");
const rest = {};
DATA.forEach(r=>r.items.forEach(i=>{ if(!covered.has(i)) rest[i]=(rest[i]||0)+1; }));
const chipsEl = document.getElementById("chips");
Object.keys(rest).sort((a,b)=>rest[b]-rest[a]).forEach(name=>{
  const b = document.createElement("button");
  b.textContent = name;
  b.onclick = ()=>select(b, [name], name);
  chipsEl.appendChild(b);
});

const geppaBtn = document.getElementById("geppaBtn");
geppaBtn.onclick = ()=>{
  if(activeBtn) activeBtn.classList.remove("active");
  activeBtn = geppaBtn; geppaBtn.classList.add("active");
  shownAll = false;
  render(r => r.geppa, "月破", "月破＝大凶日。契約・開業など大事な行動は避ける。◎印と重なる日は流派により判断が分かれるため両方表示しています。");
};

function select(btn, match, label){
  if(activeBtn) activeBtn.classList.remove("active");
  activeBtn = btn; btn.classList.add("active");
  shownAll = false;
  const mm = match.filter(m=>MEANING[m]).map(m=>m+"＝"+MEANING[m]);
  render(r => r.items.some(i => match.includes(i)), label, mm[0] || "", match);
}

function gcalUrl(r, label){
  const d1 = r.date.replaceAll("-","");
  const nx = new Date(r.date + "T00:00:00");
  nx.setDate(nx.getDate() + 1);
  const d2 = nx.getFullYear() + String(nx.getMonth()+1).padStart(2,"0") + String(nx.getDate()).padStart(2,"0");
  const details = r.kanshi + (r.mark||"") + " " + r.items.join("・") + "（擇日こよみ）";
  return "https://calendar.google.com/calendar/render?action=TEMPLATE"
       + "&text=" + encodeURIComponent(label)
       + "&dates=" + d1 + "/" + d2
       + "&details=" + encodeURIComponent(details);
}

function render(pred, label, meaningText, match){
  const t = todayStr();
  const hits = DATA.filter(r => r.date >= t && pred(r));
  const el = document.getElementById("result");
  let h = "";
  if(meaningText) h += '<p class="meaning">'+meaningText+'</p>';
  if(!hits.length){
    h += '<div class="empty">未記録 ─ '+fmt(last).txt+'までに「'+label+'」の日はありません。</div>';
  }else{
    const list = shownAll ? hits : hits.slice(0,10);
    list.forEach(r=>{
      const f = fmt(r.date);
      const its = r.items.map(i => (match && match.includes(i)) ? "<b>"+i+"</b>" : i).join("・");
      let badge = "";
      if(r.geppa && r.p==="冲") badge = '<span class="worst">大凶</span>';
      else{
        if(r.geppa) badge += '<span class="gp">月破</span>';
        if(r.p==="冲") badge += '<span class="pm chong">▲</span>';
      }
      if(r.p==="吉" && !r.geppa) badge += '<span class="pm star">⭐</span>';
      const rk = r.r ? '<span class="rk'+(r.r==="大安"?" taian":r.r==="仏滅"?" butsu":"")+'">'+r.r+'</span>' : "";
      const add = match ? '<a class="add" href="'+gcalUrl(r, label)+'" target="_blank" rel="noopener">＋予定</a>' : "";
      h += '<div class="day"><span class="d '+f.cls+'">'+f.txt+'<span class="wd">（'+f.wd+'）</span></span>'
         + rk + '<span class="k">'+r.kanshi+'</span>'+badge+'<span class="it">'+its+'</span>'+add+'</div>';
    });
    if(!shownAll && hits.length > 10){
      h += '<button class="more" id="moreBtn">すべて見る（あと'+(hits.length-10)+'日）</button>';
    }
  }
  el.innerHTML = h;
  const mb = document.getElementById("moreBtn");
  if(mb) mb.onclick = ()=>{ shownAll = true; render(pred, label, meaningText, match); };
  el.scrollIntoView({behavior:"smooth", block:"nearest"});
}

/* 範囲表示 */
document.getElementById("range").textContent =
  "データ登録：" + first.replaceAll("-","/") + " 〜 " + last.replaceAll("-","/");
document.getElementById("foot-range").textContent =
  "登録範囲：" + first.replaceAll("-","/") + " 〜 " + last.replaceAll("-","/") + "（以降は未記録）";
</script>
</body>
</html>
